<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Manager Pro V 2.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* --------------------------------------------------------- */
/* CONFIG: நீங்கள் விரும்பினால் இந்த மதிப்புகளை மாற்றிக்கொள்ளலாம் */
:root {
    --font-size-main: 16px; /* இங்கு 16-ஐ மாற்றி எழுத்து அளவை மாற்றவும் */
    --primary-color: #2c3e50;
    --border-bottom-height: 8px; /* வால்யூம் கண்ட்ரோல் போன்ற தடிமன் */
    --accent-color: #ffd700;
}
/* --------------------------------------------------------- */

body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; font-size: var(--font-size-main); }
.app-container { max-width: 600px; margin: auto; background: white; min-height: 100vh; padding-bottom: 20px; }

/* வால்யூம் கண்ட்ரோல் பாட்டம் கலர் ஸ்டைல் */
.btn-style {
    border: none; border-bottom: var(--border-bottom-height) solid var(--accent-color);
    background: #e0e0e0; padding: 15px; border-radius: 5px; cursor: pointer;
    margin: 10px; width: calc(100% - 20px); font-weight: bold;
}

.header-banner { background: var(--primary-color); color: white; padding: 20px; text-align: center; }
.g-indicator { color: #2ecc71; font-weight: bold; font-size: 20px; float: right; }

/* அனைத்து ஸ்கிரீன்ஸும் தனித்தனியாக */
.screen { display: none; }
.active-screen { display: block; }

/* புதிய என்ட்ரி மற்றும் சர்ச் பாக்ஸ் ஸ்டைல் */
.input-box { border: 2px solid #ccc; padding: 12px; margin: 10px; border-radius: 8px; width: 90%; }
</style>
</head>
<body>

<div class="app-container">
    <div id="loginScreen" class="screen active-screen">
        <div class="header-banner"><h2>LOGIN</h2></div>
        <input type="password" id="passInput" class="input-box" placeholder="Password">
        <button class="btn-style" onclick="verifyLogin()">ENTER</button>
    </div>

    <div id="mainScreen" class="screen">
        <div class="header-banner">
            Finance Manager V 2.3 <span id="gIndicator" class="g-indicator">G</span>
        </div>
        <button class="btn-style" onclick="showScreen('userListScreen')">USER LIST</button>
        <button class="btn-style" onclick="showScreen('settingsScreen')">SETTINGS</button>
    </div>

    <div id="userListScreen" class="screen">
        <div class="header-banner"><h2>USERS</h2></div>
        <div id="userListContent"></div>
    </div>
    
    <div id="settingsScreen" class="screen">
        <div class="header-banner"><h2>SETTINGS</h2></div>
        </div>
</div>

<script>
    // உங்கள் ஸ்கிரிப்ட் லாஜிக் மற்றும் ஆல் டெலிட் எக்ஸ்போர்ட் வசதி இங்கே வரும்
    function autoDeleteWithExport() {
        let fileName = "Finance_Backup_" + new Date().toISOString().slice(0,10) + ".json";
        alert("கோப்பு டவுன்லோடு செய்யப்படுகிறது: " + fileName);
        // எக்ஸ்போர்ட் லாஜிக்...
        // பிறகு டெலிட் லாஜிக்...
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    }

    function verifyLogin() {
        // லாகின் லாஜிக்
        showScreen('mainScreen');
    }
</script>

</body>
</html>
